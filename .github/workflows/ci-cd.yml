name: CI/CD DevOps Pipeline

on:
  push:
    branches: [main]

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installer dependances
        run: pip install -r requirements.txt

      - name: Lancer les tests
        run: pytest test_app.py -v

  build-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build et Push image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

  deploy:
    needs: build-push
    runs-on: ubuntu-latest

    env:
      IMAGE: ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "Starting deployment on EC2..."
            
            # Set kubeconfig to K3s
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            
            # Apply your manifest
            kubectl apply -f ~/k3s.yaml --insecure-skip-tls-verify
            
            # Update deployment image
            kubectl set image deployment/devops-app devops-app=$IMAGE
            kubectl rollout restart deployment/devops-app
            kubectl rollout status deployment/devops-app --timeout=120s
            
            echo "Deployment completed successfully."
