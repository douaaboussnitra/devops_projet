name: CI/CD DevOps Pipeline

on:
  push:
    branches: [main]

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Installer dépendances
        run: pip install -r requirements.txt
      - name: Lancer les tests
        run: pytest test_app.py -v

  build-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: \${{ secrets.DOCKER_USERNAME }}
          password: \${{ secrets.DOCKER_PASSWORD }}
      - name: Build et Push image
        run: |
          docker build -t \${{ secrets.DOCKER_USERNAME }}/devops-app:latest .
          docker push \${{ secrets.DOCKER_USERNAME }}/devops-app:latest

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Vérifier les fichiers k3s
        run: |
          echo "Fichiers dans k3s/:"
          ls -la k3s/
          cat k3s/deployment.yaml

      - name: Deploy sur serveur k3s via SSH
        uses: appleboy/ssh-action@master
        with:
          host: \${{ secrets.SERVER_IP }}
          username: ubuntu
          key: \${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu
            kubectl apply -f k3s/deployment.yaml
            kubectl apply -f k3s/service.yaml
            kubectl rollout status deployment/devops-app
