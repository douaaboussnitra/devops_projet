name: CI/CD DevOps Pipeline

on:
  push:
    branches: [main]

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installer dependances
        run: pip install -r requirements.txt

      - name: Lancer les tests
        run: pytest test_app.py -v

  build-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build et Push image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    env:
      KUBECONFIG: /tmp/kubeconfig
      IMAGE: ${{ secrets.DOCKER_USERNAME }}/devops-app:latest
    steps:
      - uses: actions/checkout@v3

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          echo "$KUBE_CONFIG_DATA" | base64 --decode > "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k3s/ --insecure-skip-tls-verify=true

      - name: Update image
        run: |
          kubectl set image deployment/devops-app devops-app=$IMAGE
          kubectl rollout restart deployment/devops-app
          kubectl rollout status deployment/devops-app --timeout=60s
